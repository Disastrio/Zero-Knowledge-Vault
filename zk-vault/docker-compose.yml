services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    container_name: zk-vault-backend
    working_dir: /app/backend
    command: sh -c "npm install && node server.js"
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    environment:
      PORT: "${BACKEND_PORT:-3001}"
      CORS_ORIGIN: "http://localhost:${FRONTEND_PORT:-5173},http://localhost:3000"
      NODE_ENV: "development"
    volumes:
      - ./backend:/app/backend
      - backend_node_modules:/app/backend/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: zk-vault-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      NODE_ENV: "development"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
  backend_node_modules:
